# ============================================
# TradeOS V2 — Docker Compose
# Backend (FastAPI) + Frontend (Next.js)
# ============================================

services:
  # ── Backend API ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DEBUG=false
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
    volumes:
      - tradeos-storage:/app/v2/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend ──
  frontend:
    build:
      context: ./binary-investor
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tradeos-storage:
